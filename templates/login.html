<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #2f3542;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box {
    background:white;
    padding:30px;
    border-radius:10px;
    width:350px;
}
</style>

</head>

<body>

<div class="login-box">
    <h3 class="text-center">Ebook Login</h3>

    <form method="POST">
        <input name="username" class="form-control mt-3" placeholder="Username">
        <input name="password" type="password" class="form-control mt-3" placeholder="Password">

        <button class="btn btn-primary w-100 mt-3">Login</button>
    </form>
</div>

</body>
</html>

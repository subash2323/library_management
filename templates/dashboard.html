<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .card-box {
            border-radius: 12px;
            padding: 20px;
            color: white;
            transition: 0.3s;
        }

        .card-box:hover {
            transform: translateY(-5px);
        }

        .bg-books { background: linear-gradient(45deg, #17a2b8, #00c6ff); }
        .bg-borrow { background: linear-gradient(45deg, #28a745, #5cd65c); }
        .bg-return { background: linear-gradient(45deg, #ffc107, #ffdd57); }

        .card-title {
            font-size: 18px;
            font-weight: 500;
        }

        .card-value {
            font-size: 30px;
            font-weight: bold;
        }

        .header-box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0px 2px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div style="width:220px; height:100vh; background:#1e293b; color:white; padding:15px;">
        <h4>📚 Lib Mng</h4>
        <hr>
        <a href="/" class="d-block text-white mb-2">Dashboard</a>
        <a href="/add_book" class="d-block text-white mb-2">Add Books</a>
        <a href="/users" class="d-block text-white mb-2">Users</a>
        <a href="/borrow_details" class="d-block text-white mb-2">Borrow Details</a>
        <a href="/issue" class="d-block text-white mb-2">Issue Book</a>
        <a href="/books" class="d-block text-white mb-2">Books</a>
        <a href="/logout" class="d-block text-white mt-3">Logout</a>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4">

        <!-- Header -->
        <div class="header-box">
            <h5>Welcome admin 👋</h5>
        </div>

        <!-- Cards -->
        <div class="row">

            <div class="col-md-4">
                <div class="card-box bg-books shadow">
                    <div class="card-title">📘 Total Books</div>
                    <div class="card-value">{{ total }}</div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card-box bg-borrow shadow">
                    <div class="card-title">📗 Borrowed</div>
                    <div class="card-value">{{ borrowed }}</div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card-box bg-return shadow">
                    <div class="card-title">📙 Returned</div>
                    <div class="card-value">{{ returned }}</div>
                </div>
            </div>

        </div>

        <!-- Extra Section -->
        <div class="mt-5">
            <div class="card p-4 shadow-sm">
                <h5>📊 Quick Info</h5>
                <p>Total Books in Library: <b>{{ total }}</b></p>
                <p>Currently Borrowed: <b>{{ borrowed }}</b></p>
                <p>Returned Books: <b>{{ returned }}</b></p>
            </div>
        </div>

    </div>
</div>

</body>
</html>
